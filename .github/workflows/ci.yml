name: OCaml CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest]
        ocaml-compiler: [5.0.0]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Use OCaml ${{ matrix.ocaml-compiler }}
      uses: ocaml/setup-ocaml@v3
      with:
        ocaml-compiler: ${{ matrix.ocaml-compiler }}

    - name: Compile Native Binary
      run: |
        opam exec -- ocamlopt -w +a-4-40-42-70 -o microgpt microgpt.ml
        opam exec -- ocamlopt -w +a-4-40-42-70 -o fastgpt fastgpt.ml

    - name: Run Smoke Test
      run: opam exec -- ./microgpt | head -n 20

    - name: Verify Bit-Level Parity
      run: |
        opam exec -- ./microgpt | head -n 12 > micro_out.txt
        opam exec -- ./fastgpt | head -n 12 > fast_out.txt
        diff micro_out.txt fast_out.txt
